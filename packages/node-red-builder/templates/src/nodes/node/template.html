<div class="form-row">
	<label for="node-input-name">
		<i class="fa fa-tag"></i>
		<span data-i18n="__NODE_NAME__.label.name"></span>
	</label>
	<input type="text" id="node-input-name" data-i18n="[placeholder]__NODE_NAME__.placeholder.name" />
</div>
<!-- __CONFIG_ROW__ -->
<div class="form-row">
	<label for="node-input-action">
		<i class="fa fa-tasks"></i>
		<span data-i18n="__NODE_NAME__.label.action"></span>
	</label>
	<input type="text" id="node-input-action" />
	<input type="hidden" id="node-input-actionType" />
</div>
<div class="form-row">
	<label for="node-input-topic">
		<i class="fa fa-envelope"></i>
		<span data-i18n="__NODE_NAME__.label.topic"></span>
	</label>
	<input type="text" id="node-input-topic" style="width: 70%;" />
	<input type="hidden" id="node-input-topicType" />
</div>
