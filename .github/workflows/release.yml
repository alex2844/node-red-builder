name: Create Release

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version'

permissions:
  id-token: write
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Resolve version
        id: changelog
        uses: alex2844/action-gh-changelog@v1
        with:
          version: ${{ inputs.version }}
          tag: ${{ github.ref_name }}
          calculate_version: ${{ github.event_name == 'workflow_dispatch' && inputs.version == '' }}
          generate_changelog: false

      - name: Push tag
        if: github.event_name == 'workflow_dispatch'
        env:
          TAG: ${{ steps.changelog.outputs.version }}
        run: |
          git tag "${TAG}"
          git push origin "${TAG}"

      - name: Generate Changelog
        id: notes
        uses: alex2844/action-gh-changelog@v1
        with:
          tag: ${{ steps.changelog.outputs.version }}

      - name: Publish Packages
        uses: alex2844/action-bun-monopub@v1
        with:
          version: ${{ steps.changelog.outputs.version }}

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          body: ${{ steps.notes.outputs.changelog }}
          tag_name: ${{ steps.changelog.outputs.version }}
          files: packages/node-red-builder/node-red-builder-*.tgz
